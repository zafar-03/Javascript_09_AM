<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Element Content</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background-color: white;
            width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1{
            color: #4f46e5;
            margin-bottom: 20px;
        }

        h1 span{
            color: #e11d48;
        }

        p{
            font-size: 18px;
            color: #444;
            margin-bottom: 20px;
        }

        #content{
            background-color: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            color: #111827;
            border-left: 5px solid #4f46e5;
        }
    </style>

</head>
<body>

    <div class="container">

        <h1 id="heading">
            Welcome to <span>JavaScript</span>
        </h1>

        <p id="paragraph">
            Learning JavaScript DOM Properties
        </p>

        <div id="content">
            <b>Frontend Development</b>
        </div>

    </div>

</body>
</html>

<!--

=========================================
Task: Access Element Content Using JavaScript
=========================================

Objective:
Learn how to access HTML element content using:
1. innerHTML
2. innerText
3. textContent

-----------------------------------------
Instructions
-----------------------------------------

Step 1:
Open the given HTML file in your code editor.

Step 2:
Inside the <script> tag, select the following elements using
document.getElementById():

- Heading Element (id="heading")
- Paragraph Element (id="paragraph")
- Div Element (id="content")

Step 3:
Use the innerHTML property to access the content of the
heading element and display the result in the browser console.

Step 4:
Use the innerText property to access the content of the
paragraph element and display the result in the browser console.

Step 5:
Use the textContent property to access the content of the
div element and display the result in the browser console.


-----------------------------------------
Expected Output
-----------------------------------------

innerHTML Output:
Welcome to <span>JavaScript</span>

innerText Output:
Learning JavaScript DOM Properties

textContent Output:
Frontend Development


-->
