<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Access Element Content</title>

    <style>
        *{
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: Arial, Helvetica, sans-serif;
        }

        body{
            background: linear-gradient(135deg, #4f46e5, #9333ea);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container{
            background-color: white;
            width: 500px;
            padding: 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            text-align: center;
        }

        h1{
            color: #4f46e5;
            margin-bottom: 20px;
        }

        h1 span{
            color: #e11d48;
        }

        p{
            font-size: 18px;
            color: #444;
            margin-bottom: 20px;
        }

        #content{
            background-color: #f3f4f6;
            padding: 15px;
            border-radius: 8px;
            font-size: 18px;
            color: #111827;
            border-left: 5px solid #4f46e5;
        }
    </style>

</head>
<body>

    <div class="container">

        <h1 id="heading">
            Welcome to <span>JavaScript</span>
        </h1>

        <p id="paragraph">
            Learning JavaScript DOM Properties
        </p>

        <div id="content">
            <b>Frontend Development</b>
        </div>

    </div>

    <script>

        document.getElementById("heading").innerHTML = "Welcome to <span>JavaScript DOM</span>";
        document.getElementById("paragraph").innerText = "Learning Content Modification in JavaScript";
        document.getElementById("content").textContent = "Frontend Development with JavaScript";

    </script>
</body>
</html>
